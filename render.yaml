# ===================================
# Render Blueprint Configuration
# ===================================
# This file defines the infrastructure for deploying on Render
# Upload this file to your repository and connect it to Render

services:
  # Backend Service
  - type: web
    name: Automation and AI Hub – Backend
    env: docker
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    plan: starter # Change to 'standard' or 'pro' as needed
    region: frankfurt # or 'oregon', 'singapore', etc.
    branch: ai-hub # Change to your deployment branch
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 7845
      - key: DATABASE_URL
        sync: false # Set this in Render dashboard (secret)
      - key: AI_MODEL
        sync: false # Set this in Render dashboard
      - key: OPENAI_API_KEY
        sync: false # Set this in Render dashboard (secret)
      - key: ARTICLES_PER_SOURCE
        value: 20
      - key: SCHEDULER_INTERVAL
        value: 10
    autoDeploy: true

  # Frontend Service
  - type: web
    name: Automation and AI Hub – Frontend
    env: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: starter
    region: frankfurt
    branch: ai-hub
    healthCheckPath: /health
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: Automation and AI Hub – Backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_APP_URL
        fromService:
          type: web
          name: Automation and AI Hub – Frontend
          envVarKey: RENDER_EXTERNAL_URL
    autoDeploy: true


