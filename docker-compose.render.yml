# ===================================
# Docker Compose for Local Testing
# ===================================
# هذا الملف لاختبار Docker images محلياً قبل النشر على Render
# 
# ملاحظة: الداتابيس deployed على Render - استخدم DATABASE_URL من ملف .env
# 
# للتشغيل:
# docker-compose -f docker-compose.render.yml up --build

version: '3.8'

services:
  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: media-center-backend
    environment:
      NODE_ENV: production
      PORT: 7845
      DATABASE_URL: ${DATABASE_URL}
      AI_MODEL: ${AI_MODEL:-http://localhost:8080}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "${BACKEND_PORT:-7845}:7845"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:7845/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:7845
        VITE_APP_URL: http://localhost:7846
    container_name: media-center-frontend
    environment:
      VITE_API_URL: http://localhost:7845
      VITE_APP_URL: http://localhost:7846
    ports:
      - "${FRONTEND_PORT:-7846}:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

networks:
  default:
    name: media-center-network
